name: Type drift

# Detects when an upstream provider adds/removes a value that our hand-curated
# closed-set types (e.g. FlyVmSize, RailwayBuilder, VercelFramework) should
# track. It hits live upstreams, so it runs on a schedule rather than blocking
# PRs — a failure means a maintainer should update the relevant `*_VALUES`
# const (see `bun run test:drift`).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - run: bun run test:drift
